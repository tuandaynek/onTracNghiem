<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Lịch Sử - THPT Long Khánh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; background: #f8fafc; }
        .option-btn { transition: all 0.2s; border: 2px solid #e2e8f0; text-align: left; width: 100%; padding: 1rem; border-radius: 0.75rem; font-weight: 500; background: white; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background-color: #f8fafc; }
        .correct { border-color: #10b981 !important; background-color: #ecfdf5 !important; color: #065f46 !important; position: relative; }
        .correct::after { content: '✓ Đúng'; position: absolute; right: 1rem; font-size: 0.8rem; font-weight: bold; }
        .wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b !important; position: relative; }
        .wrong::after { content: '✗ Sai'; position: absolute; right: 1rem; font-size: 0.8rem; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .passage-box { background-color: #f8fafc; border-left: 4px solid #3b82f6; padding: 1rem; margin-bottom: 1.5rem; font-style: italic; color: #475569; line-height: 1.6; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="max-w-3xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 uppercase tracking-tight">Ôn Tập Lịch Sử</h1>
            <p class="text-slate-500 mt-2 font-medium">Tài liệu ôn thi Giữ kì 2 - THPT Long Khánh</p>
        </header>

        <!-- Tab Navigation -->
        <div class="flex bg-white shadow-sm rounded-xl mb-6 border border-slate-200 p-1">
            <button onclick="switchMode('abcd')" id="tab-abcd" class="flex-1 py-3 font-bold rounded-lg transition tab-active">
                Trắc nghiệm ABCD
            </button>
            <button onclick="switchMode('truefalse')" id="tab-tf" class="flex-1 py-3 font-bold rounded-lg transition">
                Trắc nghiệm Đúng / Sai
            </button>
        </div>

        <!-- Main Quiz Area -->
        <div class="bg-white p-6 md:p-10 rounded-2xl shadow-md border border-slate-200 min-h-[550px] flex flex-col">
            <!-- Progress Bar -->
            <div class="w-full bg-slate-100 h-2 rounded-full mb-6">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>

            <div id="quiz-content" class="flex-1">
                <div id="question-header" class="mb-2 flex justify-between items-center">
                    <span id="q-counter" class="text-blue-600 font-bold text-sm uppercase tracking-wider">Câu 1</span>
                </div>
                
                <!-- Passage for True/False -->
                <div id="passage-container" class="hidden">
                    <div class="passage-box" id="passage-text"></div>
                </div>

                <h2 id="q-text" class="text-xl font-bold text-slate-800 mb-6 leading-relaxed">Đang tải...</h2>
                
                <div id="options-grid" class="space-y-3">
                    <!-- Options injected here -->
                </div>
            </div>

            <!-- Result Overlay -->
            <div id="result-screen" class="hidden text-center py-10">
                <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-slate-800">Hoàn thành!</h3>
                <p class="text-slate-500 mt-2">Bạn đã hoàn tất phần ôn tập này.</p>
                <button onclick="restartQuiz()" class="mt-8 bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">Làm lại</button>
            </div>

            <!-- Footer Action -->
            <div id="quiz-footer" class="mt-8 pt-6 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <div id="feedback-text" class="font-bold text-lg"></div>
                <button id="next-btn" onclick="nextQuestion()" class="hidden w-full md:w-auto bg-slate-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-800 transition shadow-md">
                    Tiếp theo &rarr;
                </button>
            </div>
        </div>
    </div>

    <script>
        const abcdQuestions = [
            { q: "Sau khi lên làm vua, Lí Bí đặt quốc hiệu nước ta là:", options: ["Đại Việt", "Nam Việt", "Vạn Xuân", "Đại Cồ Việt"], a: 2 },
            { q: "Chiến thắng nào đã chấm dứt hoàn toàn thời kì một nghìn năm đô hộ của phương Bắc?", options: ["Sông Như Nguyệt", "Sông Bạch Đằng (938)", "Chi Lăng - Xương Giang", "Ngọc Hồi - Đống Đa"], a: 1 },
            { q: "Ai lãnh đạo khởi nghĩa đánh đuổi quân nhà Đường năm 722 và được tôn là “Bố cái đại vương”?", options: ["Mai Thúc Loan", "Phùng Hưng", "Bà Triệu", "Dương Đình Nghệ"], a: 0 },
            { q: "Các cuộc khởi nghĩa trong thời kỳ Bắc thuộc thể hiện điều gì?", options: ["Xây dựng kinh tế tự chủ", "Liên minh công - nông", "Truyền bá tư tưởng mới", "Tinh thần yêu nước"], a: 3 },
            { q: "Khởi nghĩa Lam Sơn (1418 - 1427) nổ ra trong bối cảnh nào?", options: ["Nhà Hồ cải cách thành công", "Nhà Trần khủng hoảng", "Nhà Minh cai trị hà khắc", "Nhà Minh suy yếu"], a: 2 },
            { q: "Nhiệm vụ của phong trào Tây Sơn sau khi đánh đổ chúa Nguyễn là gì?", options: ["Phối hợp vua Lê đánh chúa Trịnh", "Tiêu diệt 29 vạn quân Thanh", "Đánh đổ chính quyền Lê - Trịnh, thống nhất đất nước", "Phối hợp chúa Trịnh"], a: 2 },
            { q: "Điểm độc đáo của cuộc khởi nghĩa Hai Bà Trưng là:", options: ["Hán suy yếu", "Dân tham gia đông", "Thủy binh tiên phong", "Nhiều nữ tướng chỉ huy"], a: 3 },
            { q: "Ý nghĩa của phong trào Tây Sơn (1771 - 1789) là gì?", options: ["Mở ra thời kì phát triển mới", "Phát triển thành chiến tranh giải phóng dân tộc", "Đập tan âm mưu thủ tiêu văn hóa", "Đánh tan các thế lực ngoại xâm"], a: 1 },
            { q: "Nội dung nào KHÔNG đúng về ý nghĩa khởi nghĩa Lam Sơn?", options: ["Mở ra thời kì phát triển", "Chiến tranh giải phóng dân tộc", "Đập tan âm mưu thủ tiêu văn hóa", "Đánh tan các thế lực ngoại xâm hùng mạnh"], a: 2 },
            { q: "Khởi nghĩa tiêu biểu thời Bắc thuộc chống nhà Đông Hán là:", options: ["Hai Bà Trưng", "Bà Triệu", "Lý Bí", "Phùng Hưng"], a: 0 },
            { q: "Nguyên nhân nào KHÔNG đúng về thắng lợi của Tây Sơn?", options: ["Thế lực chúa Nguyễn còn mạnh", "Vai trò anh em Tây Sơn", "Truyền thống yêu nước", "Sức mạnh đại đoàn kết"], a: 0 },
            { q: "Thắng lợi nào buộc quân Minh phải chấp nhận thất bại, rút quân về nước?", options: ["Ngọc Hồi", "Tốt Động", "Rạch Gầm", "Chi Lăng - Xương Giang"], a: 3 },
            { q: "Nghĩa quân Tây Sơn thắng quân Xiêm (1785) ở đâu?", options: ["Rạch Gầm-Xoài Mút", "Ngọc Hồi-Đống Đa", "Sông Như Nguyệt", "Tây Kết, Hàm Tử"], a: 0 },
            { q: "Chiến tranh bảo vệ Tổ quốc có vai trò quan trọng đối với:", options: ["Lòng tự hào dân tộc", "Truyền thống yêu nước", "Sự sinh tồn và phát triển dân tộc", "Tinh thần đoàn kết"], a: 2 },
            { q: "Trận quyết chiến chống Nam Hán năm 938 diễn ra tại:", options: ["Sông Bạch Đằng", "Sông Như Nguyệt", "Bến Đông Bộ Đầu", "Hàm Tử"], a: 0 },
            { q: "Trận quyết chiến chống Tống thời Lý diễn ra tại:", options: ["Sông Bạch Đằng", "Sông Như Nguyệt", "Ngọc Hồi", "Đông Bộ Đầu"], a: 1 },
            { q: "Trận quyết chiến chống Thanh năm 1789 diễn ra tại:", options: ["Bạch Đằng", "Như Nguyệt", "Ngọc Hồi - Đống Đa", "Chi Lăng"], a: 2 },
            { q: "Lãnh đạo cuộc kháng chiến chống Nam Hán năm 938 là:", options: ["Ngô Quyền", "Trần Hưng Đạo", "Lê Lợi", "Quang Trung"], a: 0 },
            { q: "Lãnh đạo kháng chiến chống Xiêm và Thanh cuối thế kỷ XVIII là:", options: ["Ngô Quyền", "Trần Hưng Đạo", "Lê Lợi", "Nguyễn Huệ"], a: 3 },
            { q: "Khởi nghĩa nào bắt đầu và kết thúc bằng một hội thề lịch sử?", options: ["Mai Thúc Loan", "Hai Bà Trưng", "Lam Sơn", "Bà Triệu"], a: 2 },
            { q: "Dòng sông 3 lần đánh thắng quân xâm lược là:", options: ["Sông Đà", "Sông Bạch Đằng", "Sông Hồng", "Sông Mê-kông"], a: 1 },
            { q: "Lãnh đạo chống quân Tống năm 981 là:", options: ["Lý Thường Kiệt", "Lê Hoàn", "Ngô Quyền", "Trần Quốc Tuấn"], a: 1 },
            { q: "Năm 1258, quân dân nhà Trần thắng quân Mông Cổ tại:", options: ["Đông Bộ Đầu", "Bạch Đằng", "Chi Lăng", "Như Nguyệt"], a: 0 },
            { q: "Ý nghĩa 'đánh tan trăm vạn quân Lưu Hoằng Tháo' nói về cuộc kháng chiến nào?", options: ["Chống Thanh", "Chống Nguyên", "Chống Xiêm", "Chống Nam Hán 938"], a: 3 },
            { q: "Hồ Quý Ly xây dựng thành Tây Đô kiên cố để:", options: ["Cải cách văn hóa", "Đối phó nhà Minh", "Buộc vua Trần nhường ngôi", "Hạn điền"], a: 1 },
            { q: "Lĩnh vực nào KHÔNG có trong cải cách của Hồ Quý Ly?", options: ["Văn hoá", "Chính trị", "Kinh tế", "Thể thao - du lịch"], a: 3 },
            { q: "Mục đích chính của thành Tây Đô là:", options: ["Phòng thủ đất nước", "Đánh Chăm-pa", "Tích lương", "Tấn công Minh"], a: 0 },
            { q: "Bài học quan trọng nhất từ thất bại của nhà Hồ?", options: ["Đoàn kết toàn dân", "Quân đội hùng mạnh", "Xây thành phòng thủ", "Đoàn kết láng giềng"], a: 0 },
            { q: "Để hạn chế điền trang quý tộc, Hồ Quý Ly ban hành chính sách:", options: ["Tiền giấy", "Hạn điền", "Giáo dục", "Đo lường"], a: 1 },
            { q: "Thành Nhà Hồ được UNESCO ghi danh ở tỉnh nào?", options: ["Thanh Hóa", "Nghệ An", "Huế", "Ninh Bình"], a: 0 },
            { q: "Hồ Quý Ly thực hiện biện pháp gì để đề cao chữ Nôm?", options: ["Dịch sách chữ Hán sang Nôm", "Đưa Nôm vào thi cử", "Bắt buộc dùng Nôm", "Dạy học hoàn toàn bằng Nôm"], a: 0 },
            { q: "Đến nửa sau thế kỷ XIX, các nước Đông Dương là thuộc địa của:", options: ["Anh", "Pháp", "Hà Lan", "Mỹ"], a: 1 },
            { q: "Quốc gia nào ở ĐNA không bị thành thuộc địa?", options: ["Việt Nam", "Thái Lan", "Lào", "Miến Điện"], a: 1 },
            { q: "Năm 1945, những quốc gia ĐNA nào tuyên bố độc lập sớm nhất?", options: ["In-đô-nê-xi-a, VN, Lào", "VN, Miến Điện, Thái Lan", "Lào, Campuchia", "Mã Lai, VN"], a: 0 },
            { q: "Biến đổi quan trọng nhất của các nước ĐNA sau Thế chiến II là gì?", options: ["Được quốc tế coi trọng", "Thành lập ASEAN", "Kinh tế phát triển", "Thành quốc gia độc lập, tự chủ"], a: 3 }
        ];

        const trueFalseQuestions = [
            // CHƯƠNG V: CẢI CÁCH
            { 
                passage: "“Về văn hoá, tư tưởng, cải cách của Hồ Quý Ly thể hiện tinh thần phát huy văn hoá dân tộc, đề cao chữ Quốc ngữ (chữ Nôm), đồng thời bài bác tư tưởng các thánh hiền Trung Quốc mà gần như toàn thế giới nho sĩ bấy giờ vẫn coi là bất khả xâm phạm. Về giáo dục, nội dung cải cách thể hiện tinh thần yêu nước, tính đại chúng và gắn bó với cuộc sống”.",
                q: "Dựa vào tư liệu trên, hãy xác định tính Đúng/Sai của các ý sau:",
                options: [
                    "a) Đoạn trích đề cập đến cải cách của Hồ Quý Ly trên tất cả mọi lĩnh vực.",
                    "b) Cải cách về văn hoá, tư tưởng của Hồ Quý Ly thể hiện nhiều điểm tích cực, tiến bộ.",
                    "c) Về chữ viết, Hồ Quý Ly đề cao và khuyến khích sử dụng chữ Hán, đồng thời vẫn cho phép người dân được sử dụng chữ Nôm.",
                    "d) Một trong những ưu điểm trong cải cách của Hồ Quý Ly là nội dung giáo dục thể hiện tinh thần yêu nước, mang tính quần chúng sâu sắc."
                ],
                answers: [false, true, false, true] 
            },
            {
                passage: "“Năm 1397, tháng 6, xuống chiếu hạn chế danh điền (ruộng tư). Đại vương và trưởng công chúa thì số ruộng không hạn chế; đến thứ dân thì số ruộng là 10 mẫu. Người nào có nhiều nếu có tội, thì cho tùy ý được lấy ruộng để chuộc tội... Số ruộng thừa phải hiến cho nhà nước.”",
                q: "Về chính sách Hạn điền của Hồ Quý Ly:",
                options: [
                    "a) Chính sách hạn điền của Hồ Quý Ly đã hạn chế sự phát triển của chế độ tư hữu ruộng đất.",
                    "b) Chính sách hạn điền được áp dụng với tất cả mọi đối tượng trong xã hội, kể cả Đại vương.",
                    "c) Chính sách hạn điền chắc chắn sẽ vấp phải sự chống cự của quý tộc Trần và một bộ phận nông dân có ruộng tư.",
                    "d) Với chính sách hạn điền, tùy theo chức vụ và cấp bậc, số lượng ruộng đất sở hữu của tư nhân sẽ ít dần đi."
                ],
                answers: [true, false, true, true]
            },
            {
                passage: "“Năm 1402, “Định lại các lệ thuế và tô ruộng. Triều trước mỗi mẫu thu 3 thăng thóc, nay thu 5 thăng. Bãi dâu triều trước thu mỗi mẫu 9 quan hoặc 7 quan tiền, nay thu hạng thượng đẳng mỗi mẫu 5 quan tiền giấy... Đinh nam không có ruộng và trẻ mồ côi, đàn bà góa, thì dẫu có ruộng cũng thôi không thu”",
                q: "Về chính sách Thuế khóa:",
                options: [
                    "a) Trong cải cách của mình, Hồ Quý Ly đã cho điều chỉnh thuế khóa, tăng thuế ruộng, hạ thuế bãi dâu.",
                    "b) Nội dung cải cách trên đã hạn chế đáng kể sở hữu ruộng đất quy mô lớn của tư nhân.",
                    "c) Thể lệ thu thuế trong cải cách của Hồ Quý Ly được chia theo các hạng đất chứ không cào bằng như trước.",
                    "d) Chính sách thu thuế của Hồ Quý Ly thể hiện sự nhân đạo và tiến bộ với một số đối tượng đặc biệt khó khăn."
                ],
                answers: [true, false, true, true]
            },
            // ĐÔNG NAM Á
            {
                passage: "“Điểm chung của chính sách thống trị thực dân ở ĐNA là khai thác, vơ vét và bào rút các quốc gia trong khu vực bằng thuế khóa, cướp ruộng đất lập đồn điền, bóc lột sức người, khai thác tài nguyên... cao su, cà phê, chè, lúa gạo là những sản vật đặc trưng của ĐNA được thực dân phương Tây chú ý khai thác từ sớm”.",
                q: "Về chính sách cai trị thực dân:",
                options: [
                    "a) Đoạn trích cung cấp thông tin về chính sách khai thác, bóc lột của thực dân phương Tây với khu vực Đông Nam Á.",
                    "b) Trong công nghiệp, thực dân phương Tây tìm cách vơ vét, bào rút thông qua việc cướp ruộng đất lập đồn điền.",
                    "c) Những sản vật được coi là thế mạnh của các nước ĐNA được thực dân phương Tây chú ý đầu tư khai thác sớm.",
                    "d) Khai thác tài nguyên thiên nhiên không phải là điểm chung trong chính sách cai trị của thực dân phương Tây ở ĐNA."
                ],
                answers: [true, false, true, false]
            },
            {
                passage: "“Kể từ khi thành lập đến nay, tuy gặp nhiều khó khăn... tổ chức ASEAN đã tồn tại và phát triển với nhiều triển vọng tốt đẹp... ngày nay ASEAN đã trở thành một tổ chức có uy tín lớn trên thế giới”.",
                q: "Về tổ chức ASEAN:",
                options: [
                    "a) ASEAN là tổ chức hợp tác ở khu vực Đông Nam Á ra đời sau Chiến tranh lạnh.",
                    "b) Quá trình phát triển từ ASEAN 5 lên ASEAN 10 gặp nhiều khó khăn và trở ngại.",
                    "c) Vấn đề Biển Đông là nhân tố duy nhất tạo ra nguy cơ chia rẽ trong quan hệ giữa các nước ASEAN.",
                    "d) Sau Chiến tranh lạnh, chuyển biến thế giới buộc các nước ASEAN phải chuyển trọng tâm sang hợp tác an ninh, chính trị."
                ],
                answers: [false, true, false, false]
            },
            {
                passage: "“Chính sách ngu dân, đầu độc người dân thuộc địa bằng rượu và thuốc phiện là việc làm có ý thức của chính quyền thực dân... Nạn đói – sự dốt nát – bị đầu độc là ba quốc nạn mà người dân dưới chính quyền thuộc địa phải gánh chịu.”",
                q: "Về chính sách Văn hóa - Xã hội của thực dân:",
                options: [
                    "a) Đoạn tư liệu trên thể hiện thực dân phương Tây thi hành chính sách ngu dân để dễ bề cai trị nhân dân Đông Nam Á.",
                    "b) Về văn hoá - xã hội, chủ nghĩa thực dân phương Tây đặc biệt chú trọng đến chính sách ngu dân.",
                    "c) Việc áp dụng triệt để chính sách ngu dân có vai trò đặc biệt quan trọng để kìm hãm người dân bản xứ.",
                    "d) Hiện nay, hầu hết người dân ở các nước ĐNA đều trong tình trạng mù chữ do chính sách cai trị của thực dân để lại."
                ],
                answers: [true, true, true, false]
            },
            // KHÁNG CHIẾN
            {
                passage: "Diễn biến kháng chiến chống Nam Hán và Tống.",
                q: "Đánh giá các nhận định về kháng chiến chống Nam Hán và Tống:",
                options: [
                    "a) Đoạn trích cung cấp thông tin về diễn biến của cuộc kháng chiến chống quân Nam Hán do Ngô Quyền lãnh đạo.",
                    "b) Các cuộc kháng chiến chống ngoại xâm trong lịch sử dân tộc chỉ được tái hiện qua tác phẩm Đại Việt sử ký toàn thư.",
                    "c) Hoằng Tháo đã phối hợp chặt chẽ với Ngô Quyền về thủy binh trong cuộc kháng chiến chống quân xâm lược.",
                    "d) Kế sách cắm cọc dưới lòng sông là kế sách đánh giặc độc đáo, chưa từng có ở giai đoạn trước và sau đó."
                ],
                answers: [true, false, false, false]
            },
            {
                passage: "Trận Ngọc Hồi - Đống Đa đại phá quân Thanh.",
                q: "Đánh giá về chiến thắng Ngọc Hồi - Đống Đa:",
                options: [
                    "a) Đoạn trích phản ánh thắng lợi của nghĩa quân Lam Sơn trong cuộc kháng chiến chống quân Thanh.",
                    "b) Trận Ngọc Hồi, Đống Đa là chiến thắng quân sự tiêu biểu thể hiện tài năng cầm quân của hoàng đế Quang Trung.",
                    "c) Tôn Sĩ Nghị là một đại thần của nhà Thanh và cũng là một trong những bại tướng dưới tay vua Quang Trung.",
                    "d) Đoạn trích thể hiện nghệ thuật quân sự hành quân thần tốc, mở ra thời kì đất nước thống nhất từ ải Nam Quan đến mũi Cà Mau."
                ],
                answers: [false, true, true, false]
            }
        ];

        let currentMode = 'abcd';
        let currentIndex = 0;
        let activeQuestions = abcdQuestions;
        let currentTFAnswers = []; // To track sub-answers in TF mode

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            
            document.getElementById('tab-abcd').classList.toggle('tab-active', mode === 'abcd');
            document.getElementById('tab-tf').classList.toggle('tab-active', mode === 'truefalse');
            
            activeQuestions = (mode === 'abcd') ? abcdQuestions : trueFalseQuestions;
            
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('quiz-footer').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            if (currentIndex >= activeQuestions.length) {
                showResult();
                return;
            }

            const q = activeQuestions[currentIndex];
            const progress = (currentIndex / activeQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            document.getElementById('q-counter').innerText = `Câu ${currentIndex + 1} / ${activeQuestions.length}`;
            document.getElementById('q-text').innerText = q.q;
            
            const passageCont = document.getElementById('passage-container');
            if (currentMode === 'truefalse' && q.passage) {
                passageCont.classList.remove('hidden');
                document.getElementById('passage-text').innerText = q.passage;
                currentTFAnswers = Array(q.options.length).fill(null);
            } else {
                passageCont.classList.add('hidden');
            }

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                if (currentMode === 'abcd') {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${String.fromCharCode(65 + idx)}. ${opt}`;
                    btn.onclick = () => selectOptionABCD(btn, idx, q.a);
                    grid.appendChild(btn);
                } else {
                    // True/False layout per option
                    const container = document.createElement('div');
                    container.className = 'p-4 border border-slate-200 rounded-xl bg-slate-50 mb-3';
                    
                    const text = document.createElement('p');
                    text.className = 'font-medium text-slate-700 mb-3';
                    text.innerText = opt;
                    
                    const btnGroup = document.createElement('div');
                    btnGroup.className = 'flex gap-2';
                    
                    const btnTrue = createTFBtn('Đúng', idx, true, q.answers[idx]);
                    const btnFalse = createTFBtn('Sai', idx, false, q.answers[idx]);
                    
                    btnGroup.appendChild(btnTrue);
                    btnGroup.appendChild(btnFalse);
                    container.appendChild(text);
                    container.appendChild(btnGroup);
                    grid.appendChild(container);
                }
            });

            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('feedback-text').innerText = '';
        }

        function createTFBtn(label, optIdx, isTrueBtn, actualCorrect) {
            const btn = document.createElement('button');
            btn.className = 'flex-1 py-2 rounded-lg border-2 border-slate-200 font-bold bg-white transition-all text-sm hover:border-blue-400';
            btn.innerText = label;
            btn.onclick = () => {
                const parent = btn.parentElement;
                const btns = parent.querySelectorAll('button');
                btns.forEach(b => b.disabled = true);
                
                const isCorrect = (isTrueBtn === actualCorrect);
                if (isCorrect) {
                    btn.classList.add('correct');
                    btn.classList.replace('border-slate-200', 'border-green-500');
                } else {
                    btn.classList.add('wrong');
                    btn.classList.replace('border-slate-200', 'border-red-500');
                    // Show correct one
                    btns[actualCorrect ? 0 : 1].classList.add('correct');
                }
                
                currentTFAnswers[optIdx] = isCorrect;
                checkTFComplete();
            };
            return btn;
        }

        function checkTFComplete() {
            if (currentTFAnswers.every(val => val !== null)) {
                document.getElementById('next-btn').classList.remove('hidden');
                const correctCount = currentTFAnswers.filter(v => v === true).length;
                document.getElementById('feedback-text').innerText = `Xong! Đúng ${correctCount}/${currentTFAnswers.length} ý.`;
                document.getElementById('feedback-text').className = 'font-bold text-lg text-blue-600';
            }
        }

        function selectOptionABCD(btn, selectedIdx, correctIdx) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (selectedIdx === correctIdx) {
                btn.classList.add('correct');
                document.getElementById('feedback-text').innerText = 'Chính xác! ✨';
                document.getElementById('feedback-text').className = 'font-bold text-lg text-green-600';
            } else {
                btn.classList.add('wrong');
                allBtns[correctIdx].classList.add('correct');
                document.getElementById('feedback-text').innerText = 'Chưa đúng rồi!';
                document.getElementById('feedback-text').className = 'font-bold text-lg text-red-600';
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            loadQuestion();
        }

        function showResult() {
            document.getElementById('progress-bar').style.width = `100%`;
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('quiz-footer').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }

        function restartQuiz() {
            currentIndex = 0;
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('quiz-footer').classList.remove('hidden');
            loadQuestion();
        }

        window.onload = () => switchMode('abcd');
    </script>
</body>
</html>
