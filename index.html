<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Tin Học 11 - Full Đề Cương</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; background: #f8fafc; }
        .option-btn { transition: all 0.2s; border: 2px solid #e2e8f0; text-align: left; width: 100%; padding: 1rem; border-radius: 0.75rem; font-weight: 500; background: white; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background-color: #f8fafc; }
        .correct { border-color: #10b981 !important; background-color: #ecfdf5 !important; color: #065f46 !important; position: relative; }
        .correct::after { content: '✓ Đúng'; position: absolute; right: 1rem; font-size: 0.8rem; font-weight: bold; }
        .wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b !important; position: relative; }
        .wrong::after { content: '✗ Sai'; position: absolute; right: 1rem; font-size: 0.8rem; font-weight: bold; }
        .passage-box { background-color: #f8fafc; border-left: 4px solid #3b82f6; padding: 1rem; margin-bottom: 1.5rem; font-family: 'Consolas', monospace; color: #1e293b; line-height: 1.5; white-space: pre-wrap; font-size: 0.95rem; }
        .category-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; background: #dbeafe; color: #1e40af; margin-bottom: 8px; display: inline-block; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="max-w-3xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 uppercase tracking-tight">Ôn Tập Tin Học 11</h1>
            <p class="text-slate-500 mt-2 font-medium">Toàn bộ câu hỏi ôn thi Giữa HK2 (2024-2025)</p>
        </header>

        <div class="flex bg-white shadow-sm rounded-xl mb-6 border border-slate-200 p-1">
            <button onclick="switchMode('abcd')" id="tab-abcd" class="flex-1 py-3 font-bold rounded-lg transition tab-active">
                Trắc nghiệm ABCD
            </button>
            <button onclick="switchMode('truefalse')" id="tab-tf" class="flex-1 py-3 font-bold rounded-lg transition">
                Trắc nghiệm Đúng / Sai
            </button>
        </div>

        <div class="bg-white p-6 md:p-10 rounded-2xl shadow-md border border-slate-200 min-h-[600px] flex flex-col">
            <div class="w-full bg-slate-100 h-2 rounded-full mb-6">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>

            <div id="quiz-content" class="flex-1">
                <div id="question-header" class="mb-2 flex justify-between items-start">
                    <div>
                        <div id="q-category" class="category-tag">BÀI 17</div>
                        <div id="q-counter" class="text-blue-600 font-bold text-sm uppercase tracking-wider block">Câu 1</div>
                    </div>
                </div>
                
                <div id="passage-container" class="hidden">
                    <div class="passage-box" id="passage-text"></div>
                </div>

                <h2 id="q-text" class="text-xl font-bold text-slate-800 mb-6 leading-relaxed">Đang tải câu hỏi...</h2>
                
                <div id="options-grid" class="space-y-3"></div>
            </div>

            <div id="result-screen" class="hidden text-center py-10">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-slate-800">Hoàn thành phần này!</h3>
                <p class="text-slate-500 mt-2">Bạn đã duyệt qua tất cả câu hỏi. Hãy chuyển sang chế độ khác để ôn tập tiếp.</p>
                <button onclick="restartQuiz()" class="mt-8 bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">Làm lại phần này</button>
            </div>

            <div id="quiz-footer" class="mt-8 pt-6 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <div id="feedback-text" class="font-bold text-lg"></div>
                <button id="next-btn" onclick="nextQuestion()" class="hidden w-full md:w-auto bg-slate-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-800 transition shadow-md">Tiếp theo &rarr;</button>
            </div>
        </div>
    </div>

    <script>
        const abcdQuestions = [
    // BÀI 17
    { cat: "BÀI 17", q: "Phát biểu nào dưới đây về mảng một chiều là đúng?", options: ["Cấu trúc dữ liệu bao gồm các phần tử có thể thuộc các kiểu dữ liệu khác nhau.", "Cấu trúc dữ liệu tuyến tính bao gồm các phần tử thuộc cùng một kiểu dữ liệu.", "Tập hợp bao gồm các phần tử có thể thuộc các kiểu dữ liệu khác nhau.", "Chuỗi kí tự bao gồm các phần tử có cùng kiểu dữ liệu."], a: 1 },
    { cat: "BÀI 17", q: "Phần tử nào dưới đây là phần tử cuối cùng trong mảng a có n phần tử?", options: ["a[1]", "a[-1]", "a[0]", "a[n]"], a: 1 },
    { cat: "BÀI 17", q: "Phần tử a[-4] trong mảng a có 4 phần tử là:", options: ["a[0]", "a[-1]", "a[1]", "Không có phần tử a[-4]"], a: 0 },
    { cat: "BÀI 17", q: "Phần tử a[-5] trong mảng a có 4 phần tử là:", options: ["a[1]", "a[-1]", "a[0]", "Không có phần tử a[-5]"], a: 3 },
    { cat: "BÀI 17", q: "Cấu trúc dữ liệu mảng một chiều trong Python được biểu diễn bằng kiểu dữ liệu nào?", options: ["Tuple", "Set", "List", "Dictionary"], a: 2 },
    { cat: "BÀI 17", q: "Lệnh nào sau đây kiểm tra xem giá trị 7 có tồn tại trong mảng A = [1, 3, 5, 7, 9]?", options: ["7 in A", "A.has(7)", "A.contains(7)", "A.search(7)"], a: 0 },
    { cat: "BÀI 17", q: "Để thêm một phần tử vào cuối danh sách trong Python, ta dùng lệnh nào?", options: ["append()", "insert()", "extend()", "pop()"], a: 0 },
    { cat: "BÀI 17", q: "Mảng hai chiều là gì?", options: ["Một chuỗi các phần tử cùng kiểu dữ liệu", "Một danh sách chứa các danh sách con", "Một bảng với dữ liệu không có cấu trúc", "Một danh sách các giá trị ngẫu nhiên"], a: 1 },
    { cat: "BÀI 17", q: "Lệnh nào sau đây được dùng để truy cập phần tử tại hàng 2 cột 3 của ma trận A?", options: ["A[1][2]", "A[2][3]", "A[3][2]", "A[0][1]"], a: 0 },
    { cat: "BÀI 17", q: "Trong Python, ta có thể duyệt qua từng phần tử của mảng hai chiều bằng lệnh nào?", options: ["Một lệnh for đơn", "Hai lệnh for lồng nhau", "Hàm map()", "Lệnh while"], a: 1 },
    { cat: "BÀI 17", q: "Để tính tổng các phần tử của một danh sách trong Python, ta sử dụng hàm nào?", options: ["sum()", "max()", "min()", "avg()"], a: 0 },
    { cat: "BÀI 17", q: "Cho danh sách A = [1, 2, 3, 4, 5]. Kết quả của lệnh print(A[-1]) là gì?", options: ["1", "3", "5", "Lỗi"], a: 2 },
    { cat: "BÀI 17", q: "Mảng hai chiều trong Python có thể được biểu diễn bằng cách nào?", options: ["Dictionary chứa danh sách", "List chứa list", "Tuple chứa set", "List đơn thuần"], a: 1 },
    { cat: "BÀI 17", q: "Lệnh nào sau đây dùng để xoá một phần tử trong danh sách tại vị trí cụ thể?", options: ["list.remove(index)", "list.delete(index)", "list.clear(index)", "list.pop(index)"], a: 3 },
    { cat: "BÀI 17", q: "Phần tử nào dưới đây là phần tử đầu tiên trong mảng a có n phần tử?", options: ["a[1]", "a[-1]", "a[0]", "a[n]"], a: 2 },

    // BÀI 18
    { cat: "BÀI 18", q: "Trong nhiệm vụ 1, làm thế nào để người dùng nhập điểm kiểm tra vào chương trình?", options: ["Sử dụng hàm input() để nhập từng điểm một.", "Sử dụng hàm input() để nhập một chuỗi chứa các điểm, sau đó tách chuỗi.", "Sử dụng vòng lặp for để lần lượt nhập từng điểm.", "Nhập điểm thông qua một file bên ngoài."], a: 1 },
    { cat: "BÀI 18", q: "Cách nào là đúng để tính tổng các điểm trong danh sách marks trong nhiệm vụ 1?", options: ["Sử dụng sum(marks)", "Sử dụng vòng lặp for để cộng dồn", "Sử dụng hàm reduce", "Sử dụng sum(marks) hoặc dùng vòng lặp for"], a: 3 },
    { cat: "BÀI 18", q: "Để tìm điểm thấp nhất và cao nhất trong nhiệm vụ 1, ta dùng phương pháp nào?", options: ["Sử dụng các hàm min() và max().", "Duyệt qua danh sách và so sánh từng điểm.", "Sắp xếp danh sách và lấy phần tử đầu và cuối.", "Dùng thuật toán tìm kiếm nhị phân."], a: 0 },
    { cat: "BÀI 18", q: "Trong nhiệm vụ 2, để lưu trữ điểm kiểm tra của tất cả học sinh, ta dùng cấu trúc gì?", options: ["Mảng một chiều", "Mảng hai chiều", "Bộ từ điển", "Chuỗi"], a: 1 },
    { cat: "BÀI 18", q: "Trong nhiệm vụ 2, làm thế nào để tính điểm trung bình kiểm tra của từng học sinh?", options: ["Sử dụng hàm mean()", "Tính tổng điểm rồi chia cho số đầu điểm", "Sử dụng vòng lặp cộng dồn rồi chia", "B và C đều đúng"], a: 3 },
    { cat: "BÀI 18", q: "Để tìm tên học sinh có điểm trung bình cao nhất, chương trình thực hiện gì?", options: ["Dùng hàm max()", "Duyệt danh sách và lưu lại chỉ số của học sinh có điểm cao nhất.", "Sắp xếp danh sách giảm dần.", "Tìm học sinh có tên xuất hiện cuối cùng."], a: 1 },
    { cat: "BÀI 18", q: "Để tra cứu điểm kiểm tra cụ thể của một học sinh dựa trên số thứ tự, ta dùng:", options: ["Duyệt qua tất cả học sinh", "Truy cập trực tiếp phần tử thứ n trong hàng tương ứng của mảng hai chiều", "In ra tất cả điểm", "Cả A và B đều đúng"], a: 3 },
    { cat: "BÀI 18", q: "Để tra cứu điểm thứ n của một học sinh trong mảng một chiều, ta nên:", options: ["Dùng hàm marks[n] trực tiếp", "Kiểm tra giá trị n có hợp lệ không trước khi truy cập", "Duyệt toàn bộ mảng", "Tra cứu điểm đầu và cuối"], a: 1 },
    { cat: "BÀI 18", q: "Chương trình làm gì nếu phát hiện n vượt quá số lượng đầu điểm?", options: ["Hiển thị thông báo lỗi và yêu cầu nhập lại n.", "Lấy phần tử đầu tiên.", "Lấy phần tử cuối cùng.", "Thêm đầu điểm mới."], a: 0 },
    { cat: "BÀI 18", q: "Câu 10: Thao tác tra cứu điểm cụ thể dựa trên số thứ tự cần:", options: ["Duyệt tìm đúng số thứ tự", "Truy cập trực tiếp A[n]", "In tất cả điểm", "Cả A và B đều đúng"], a: 3 },

    // BÀI 19
    { cat: "BÀI 19", q: "Tìm kiếm tuần tự tìm số 47 trong dãy [1, 91, 45, 23, 67, 9, 10, 47, 90, 46, 86] cần bao nhiêu lần duyệt?", options: ["4", "6", "8", "7"], a: 2 },
    { cat: "BÀI 19", q: "Trong tìm kiếm tuần tự, khi nào tìm thấy kết quả nhanh nhất?", options: ["Ở giữa dãy", "Ở cuối dãy", "Không có trong dãy", "Là phần tử đầu tiên"], a: 3 },
    { cat: "BÀI 19", q: "Trong tìm kiếm tuần tự, khi nào cần nhiều bước nhất?", options: ["Ở giữa danh sách", "Là phần tử cuối cùng", "Không có trong danh sách", "B và C đều đúng"], a: 3 },
    { cat: "BÀI 19", q: "Tìm kiếm nhị phân yêu cầu danh sách phải sắp xếp thế nào?", options: ["Tăng dần", "Giảm dần", "Không cần sắp xếp", "Tăng hoặc Giảm dần"], a: 3 },
    { cat: "BÀI 19", q: "Tìm số 34 trong dãy [0, 4, 9, 10, 12, 14, 17, 18, 20, 31, 34, 67] bằng nhị phân cần bao nhiêu lần?", options: ["2", "3", "4", "5"], a: 1 },
    { cat: "BÀI 19", q: "Tìm số 34 trong dãy trên bằng tuần tự cần bao nhiêu phần tử?", options: ["6", "10", "12", "11"], a: 1 },
    { cat: "BÀI 19", q: "Ưu điểm của nhị phân so với tuần tự là:", options: ["Dễ lập trình hơn", "Áp dụng cho mọi danh sách", "Tốc độ nhanh hơn khi danh sách đã sắp xếp", "Không cần sắp xếp trước"], a: 2 },
    { cat: "BÀI 19", q: "Tìm K=9 trong [1, 3, 4, 7, 8, 9, 10] bằng nhị phân trả về chỉ số nào?", options: ["3", "4", "5", "6"], a: 2 },
    { cat: "BÀI 19", q: "Tìm kiếm tuần tự áp dụng được khi nào?", options: ["Dữ liệu đã sắp xếp", "Dữ liệu chưa được sắp xếp", "Chỉ cho dãy số", "Cả A và B"], a: 3 },
    { cat: "BÀI 19", q: "Nếu dãy sắp xếp giảm dần, thuật toán nhị phân sẽ:", options: ["Hoạt động bình thường", "Phải thay đổi so sánh ngược lại", "Không thể áp dụng", "Chỉ dùng cho dãy ngắn"], a: 1 },
    { cat: "BÀI 19", q: "Bộ kiểm thử (test-suite) nào phát hiện nhiều lỗi nhất cho nhị phân?", options: ["a=[1,3,7], k=1; a=[2,3,4,5], k=4", "a=[], k=1; a=[1,2,3], k=1; a=[1,2,3], k=4", "a=[1,3,4], k=2; a=[1,2], k=2", "a=[], k=1; a=[1,2], k=1"], a: 1 },
    { cat: "BÀI 19", q: "Nhị phân tìm k=3 trong [1,3,4,5,6,7,9] mất bao nhiêu bước?", options: ["1", "2", "3", "4"], a: 1 },
    { cat: "BÀI 19", q: "Nhị phân tìm k=2 trong [1,3,4,5,6,7,9] mất bao nhiêu bước?", options: ["1", "2", "3", "4"], a: 2 },
    { cat: "BÀI 19", q: "Nhị phân tìm k=3 trong [1,3,4,5,6,7,9] sẽ so sánh với những số nào?", options: ["5, 3", "1, 3", "5, 4, 3", "5, 1, 3"], a: 0 },
    { cat: "BÀI 19", q: "Nhị phân tìm k=20 trong [1,3,4,5,6,7,9] sẽ so sánh với số nào?", options: ["6, 7, 9", "5, 6, 7", "5, 6, 7, 9", "5, 7, 9"], a: 3 },
    { cat: "BÀI 19", q: "Nhị phân dãy [1,3,6,6,6,6,7,9] tìm k=6 sẽ thấy tại:", options: ["a[2]", "a[3]", "a[4]", "a[5]"], a: 1 },

    // BÀI 20
    { cat: "BÀI 20", q: "Ý tưởng chính của sắp xếp chèn là gì?", options: ["Tìm số nhỏ nhất đưa về đầu.", "Hoán đổi cặp liền kề.", "Chèn từng phần tử vào đúng vị trí mảng con đã sắp xếp.", "Chia mảng đệ quy."], a: 2 },
    { cat: "BÀI 20", q: "Sắp xếp chèn có bao nhiêu so sánh trong trường hợp tốt nhất?", options: ["0", "n-1", "n(n-1)/2", "n-2"], a: 1 },
    { cat: "BÀI 20", q: "Trong sắp xếp chọn, điều gì xảy ra mỗi lần lặp?", options: ["Số lớn nhất về cuối.", "Số nhỏ nhất được đưa vào đúng vị trí đầu phần chưa sắp xếp.", "Mỗi phần tử chèn đúng vị trí.", "Hoán đổi liền kề."], a: 1 },
    { cat: "BÀI 20", q: "Thuật toán nào không sử dụng so sánh?", options: ["Chèn", "Chọn", "Đếm", "Nổi bọt"], a: 2 },
    { cat: "BÀI 20", q: "Mục đích vòng lặp trong của nổi bọt là gì?", options: ["Tìm số lớn nhất", "Tìm số nhỏ nhất", "So sánh hoán đổi các cặp liền kề", "Chia mảng"], a: 2 },
    { cat: "BÀI 20", q: "Trường hợp tốt nhất của nổi bọt là:", options: ["Mảng ngược", "Mảng đã sắp xếp", "Mảng giống nhau", "Mảng 2 số"], a: 1 },
    { cat: "BÀI 20", q: "Cách xác định vị trí chèn trong sắp xếp chèn?", options: ["Tìm số ở giữa", "Dịch chuyển phần tử lớn hơn sang phải", "Hoán đổi liên tục", "Chia đệ quy"], a: 1 },
    { cat: "BÀI 20", q: "Thuật toán nào phù hợp nhất cho số lượng hàng trong kho tăng dần?", options: ["Nổi bọt", "Chọn", "Chèn", "Nhanh"], a: 2 },
    { cat: "BÀI 20", q: "Vì sao phải dịch chuyển phần tử lớn hơn lên 1 vị trí trong sắp xếp chèn?", options: ["Tìm vị trí chính xác", "Giảm so sánh", "Giảm trao đổi", "Tăng tốc độ"], a: 0 },
    { cat: "BÀI 20", q: "Trong sắp xếp chọn, biến Max dùng để làm gì?", options: ["Lưu số nhỏ nhất", "Lưu chỉ số phần tử lớn nhất", "Lưu chỉ số phần tử nhỏ nhất", "Chỉ số cuối"], a: 1 },
    { cat: "BÀI 20", q: "Sắp xếp nổi bọt dùng khi nào?", options: ["Lượng lớn dữ liệu", "Danh sách nhỏ/trung bình", "Không cần hiệu suất cao", "Đã sắp xếp rồi"], a: 1 },

        let currentMode = 'abcd';
        let currentIndex = 0;
        let activeQuestions = abcdQuestions;
        let currentTFAnswers = [];

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            document.getElementById('tab-abcd').classList.toggle('tab-active', mode === 'abcd');
            document.getElementById('tab-tf').classList.toggle('tab-active', mode === 'truefalse');
            activeQuestions = (mode === 'abcd') ? abcdQuestions : trueFalseQuestions;
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('quiz-footer').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            if (currentIndex >= activeQuestions.length) {
                showResult();
                return;
            }

            const q = activeQuestions[currentIndex];
            const progress = (currentIndex / activeQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            document.getElementById('q-category').innerText = q.cat;
            document.getElementById('q-counter').innerText = `Câu ${currentIndex + 1} / ${activeQuestions.length}`;
            document.getElementById('q-text').innerText = q.q;
            
            const passageCont = document.getElementById('passage-container');
            if (currentMode === 'truefalse' && q.passage) {
                passageCont.classList.remove('hidden');
                document.getElementById('passage-text').innerText = q.passage;
                currentTFAnswers = Array(q.options.length).fill(null);
            } else {
                passageCont.classList.add('hidden');
            }

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                if (currentMode === 'abcd') {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${String.fromCharCode(65 + idx)}. ${opt}`;
                    btn.onclick = () => selectOptionABCD(btn, idx, q.a);
                    grid.appendChild(btn);
                } else {
                    const container = document.createElement('div');
                    container.className = 'p-4 border border-slate-200 rounded-xl bg-slate-50 mb-3';
                    const text = document.createElement('p');
                    text.className = 'font-medium text-slate-700 mb-3';
                    text.innerText = opt;
                    const btnGroup = document.createElement('div');
                    btnGroup.className = 'flex gap-2';
                    btnGroup.appendChild(createTFBtn('Đúng', idx, true, q.answers[idx]));
                    btnGroup.appendChild(createTFBtn('Sai', idx, false, q.answers[idx]));
                    container.appendChild(text);
                    container.appendChild(btnGroup);
                    grid.appendChild(container);
                }
            });

            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('feedback-text').innerText = '';
        }

        function createTFBtn(label, optIdx, isTrueBtn, actualCorrect) {
            const btn = document.createElement('button');
            btn.className = 'flex-1 py-2 rounded-lg border-2 border-slate-200 font-bold bg-white transition-all text-sm hover:border-blue-400';
            btn.innerText = label;
            btn.onclick = () => {
                const parent = btn.parentElement;
                const btns = parent.querySelectorAll('button');
                btns.forEach(b => b.disabled = true);
                const isCorrect = (isTrueBtn === actualCorrect);
                if (isCorrect) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    btns[actualCorrect ? 0 : 1].classList.add('correct');
                }
                currentTFAnswers[optIdx] = isCorrect;
                checkTFComplete();
            };
            return btn;
        }

        function checkTFComplete() {
            if (currentTFAnswers.every(val => val !== null)) {
                document.getElementById('next-btn').classList.remove('hidden');
                const correctCount = currentTFAnswers.filter(v => v === true).length;
                document.getElementById('feedback-text').innerText = `Kết quả: Đúng ${correctCount}/${currentTFAnswers.length} ý.`;
                document.getElementById('feedback-text').className = 'font-bold text-lg text-blue-600';
            }
        }

        function selectOptionABCD(btn, selectedIdx, correctIdx) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);
            if (selectedIdx === correctIdx) {
                btn.classList.add('correct');
                document.getElementById('feedback-text').innerText = 'Chính xác! ✨';
                document.getElementById('feedback-text').className = 'font-bold text-lg text-green-600';
            } else {
                btn.classList.add('wrong');
                allBtns[correctIdx].classList.add('correct');
                document.getElementById('feedback-text').innerText = 'Sai rồi!';
                document.getElementById('feedback-text').className = 'font-bold text-lg text-red-600';
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            loadQuestion();
        }

        function showResult() {
            document.getElementById('progress-bar').style.width = `100%`;
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('quiz-footer').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }

        function restartQuiz() {
            currentIndex = 0;
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('quiz-footer').classList.remove('hidden');
            loadQuestion();
        }

        window.onload = () => switchMode('abcd');
    </script>
